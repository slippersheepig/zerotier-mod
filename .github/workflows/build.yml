name: Build & Release APK

on:
  repository_dispatch:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      corever: ${{ steps.set_corever.outputs.corever }}
    steps:
      - name: Checkout ZeroTierFix
        uses: actions/checkout@v4
        with:
          repository: "kaaass/ZerotierFix"
          path: "ZerotierFix"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: "ZeroTierFix-Build"

      - name: Change Source
        id: set_corever
        run: |
          release=$(curl -fsSL "https://api.github.com/repos/zerotier/ZeroTierOne/releases/latest")
          tag=$(jq -r '.tag_name' <<< "$release")
          version=${tag#v}
          ver=${version//./}
          echo "zt_ref=$tag" >> "$GITHUB_OUTPUT"
          echo "corever=$ver" >> "$GITHUB_ENV"
          echo "corever=$ver" >> "$GITHUB_OUTPUT"
          cd ZerotierFix/app
          sed -r -i "s/versionName \"(.*?)\"/versionName \"\1_$ver\"/g" build.gradle
          cd ../
          rm -rf externals
          mkdir externals

      - name: Checkout ZeroTierOne
        uses: actions/checkout@v4
        with:
          repository: "zerotier/ZeroTierOne"
          path: "ZerotierFix/externals/core"
          ref: ${{ steps.set_corever.outputs.zt_ref }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix CMake
        run: |
          cd ZerotierFix/externals/core/java
          rm CMakeLists.txt
          cp ../../../../ZeroTierFix-Build/CMakeLists.txt .
          cd ../../../../

      - name: Build APK
        run: |
          cd ZerotierFix
          chmod +x ./gradlew
          ./gradlew assemble --no-daemon
          cd ..
          apk=$(find ZerotierFix -path '*/build/outputs/apk/*/*.apk' -type f | head -n 1)
          if [ -z "$apk" ]; then
            echo "No APK produced by Gradle" >&2
            exit 1
          fi
          cp "$apk" "ZerotierFix-${{ env.corever }}.apk"

      - name: Sign APK
        id: sign_app
        uses: noriban/sign-android-release@v5.1
        with:
          releaseDirectory: .
          signingKeyBase64: ${{ secrets.KEYSTORE }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          alias: ${{ secrets.KEYSTORE_ALIAS }}

      - name: Upload apk
        uses: actions/upload-artifact@v4
        with:
          name: ZerotierFix-${{ env.corever }}
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download signed APK
        uses: actions/download-artifact@v4
        with:
          name: ZerotierFix-${{ needs.build.outputs.corever }}
          path: ./output

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build.outputs.corever }}
          name: Release ${{ needs.build.outputs.corever }}
          generate_release_notes: true
          files: |
            output/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
